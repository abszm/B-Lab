version: '3.8'

services:
  server:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  client:
    build:
      context: ../client
      dockerfile: ../docker/Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
