version: '3.8'

services:
  server:
    image: abszm/multiplayer-games-server:latest
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  client:
    image: abszm/multiplayer-games-client:latest
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
